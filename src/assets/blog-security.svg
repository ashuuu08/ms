<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="secGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#secGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#10B981" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  
  <!-- Shield -->
  <path d="M400 100 L480 130 L480 220 Q480 280 400 320 Q320 280 320 220 L320 130 Z" fill="url(#shieldGrad)" opacity="0.9"/>
  <path d="M400 100 L480 130 L480 220 Q480 280 400 320 Q320 280 320 220 L320 130 Z" fill="none" stroke="#10B981" stroke-width="3"/>
  
  <!-- Lock icon inside shield -->
  <rect x="380" y="190" width="40" height="50" rx="5" fill="#0F172A" opacity="0.8"/>
  <circle cx="400" cy="170" r="15" fill="none" stroke="#0F172A" stroke-width="6" opacity="0.8"/>
  <circle cx="400" cy="215" r="5" fill="#10B981"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="650" cy="200" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="200" cy="300" r="3" fill="#10B981" opacity="0.5"/>
  <circle cx="600" cy="320" r="3" fill="#10B981" opacity="0.5"/>
  
  <!-- Binary code effect -->
  <text x="100" y="100" font-family="monospace" font-size="12" fill="#10B981" opacity="0.3">101010</text>
  <text x="650" y="130" font-family="monospace" font-size="12" fill="#10B981" opacity="0.3">110101</text>
  <text x="120" y="350" font-family="monospace" font-size="12" fill="#10B981" opacity="0.3">010101</text>
  
  <!-- Title -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Cybersecurity</text>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="18" fill="#10B981" text-anchor="middle">Protect Your Business</text>
</svg>
