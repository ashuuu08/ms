<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#devGrad)"/>
  
  <!-- Code window -->
  <rect x="150" y="80" width="500" height="280" rx="10" fill="#1E293B" opacity="0.9"/>
  
  <!-- Window controls -->
  <circle cx="175" cy="105" r="6" fill="#EF4444"/>
  <circle cx="195" cy="105" r="6" fill="#F59E0B"/>
  <circle cx="215" cy="105" r="6" fill="#10B981"/>
  
  <!-- Code lines -->
  <rect x="180" y="140" width="120" height="8" rx="4" fill="#8B5CF6" opacity="0.6"/>
  <rect x="180" y="165" width="200" height="8" rx="4" fill="#06B6D4" opacity="0.6"/>
  <rect x="200" y="190" width="180" height="8" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="200" y="215" width="150" height="8" rx="4" fill="#F59E0B" opacity="0.6"/>
  <rect x="180" y="240" width="220" height="8" rx="4" fill="#8B5CF6" opacity="0.6"/>
  <rect x="180" y="265" width="100" height="8" rx="4" fill="#06B6D4" opacity="0.6"/>
  <rect x="180" y="290" width="190" height="8" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="200" y="315" width="160" height="8" rx="4" fill="#F59E0B" opacity="0.6"/>
  
  <!-- Brackets -->
  <text x="450" y="200" font-family="monospace" font-size="80" fill="#ffffff" opacity="0.2">{</text>
  <text x="520" y="280" font-family="monospace" font-size="80" fill="#ffffff" opacity="0.2">}</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="200" r="30" fill="#ffffff" opacity="0.1"/>
  <circle cx="700" cy="250" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- Title -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Web Development</text>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.9">Building Scalable Apps</text>
</svg>
