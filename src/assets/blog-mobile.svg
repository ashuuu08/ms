<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#mobileGrad)"/>
  
  <!-- Mobile devices -->
  <g opacity="0.9">
    <!-- Phone 1 -->
    <rect x="280" y="100" width="140" height="250" rx="15" fill="#1E293B" opacity="0.8"/>
    <rect x="290" y="115" width="120" height="200" rx="5" fill="#ffffff" opacity="0.3"/>
    <circle cx="350" cy="235" r="8" fill="#F59E0B" opacity="0.7"/>
    <rect x="330" y="255" width="40" height="5" rx="2.5" fill="#ffffff" opacity="0.5"/>
    
    <!-- Phone 2 -->
    <rect x="380" y="120" width="140" height="250" rx="15" fill="#1E293B" opacity="0.7"/>
    <rect x="390" y="135" width="120" height="200" rx="5" fill="#ffffff" opacity="0.2"/>
    <circle cx="450" cy="255" r="8" fill="#EF4444" opacity="0.7"/>
    <rect x="430" y="275" width="40" height="5" rx="2.5" fill="#ffffff" opacity="0.4"/>
  </g>
  
  <!-- Responsive waves -->
  <path d="M 200 225 Q 250 200 300 225 T 400 225 T 500 225 T 600 225" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M 200 250 Q 250 225 300 250 T 400 250 T 500 250 T 600 250" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.2"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="30" fill="#ffffff" opacity="0.1"/>
  <circle cx="650" cy="300" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- Icons -->
  <circle cx="320" cy="180" r="12" fill="#10B981" opacity="0.6"/>
  <circle cx="380" cy="180" r="12" fill="#3B82F6" opacity="0.6"/>
  <circle cx="320" cy="210" r="12" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="380" cy="210" r="12" fill="#06B6D4" opacity="0.6"/>
  
  <!-- Title -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Mobile Development</text>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.9">Mobile-First Approach</text>
</svg>
