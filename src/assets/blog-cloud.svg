<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#cloudGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#ffffff" opacity="0.1"/>
  <circle cx="700" cy="370" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="650" cy="100" r="40" fill="#ffffff" opacity="0.15"/>
  
  <!-- Cloud shapes -->
  <g opacity="0.9">
    <ellipse cx="200" cy="200" rx="80" ry="50" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="250" cy="190" rx="70" ry="45" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="220" cy="180" rx="60" ry="40" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <g opacity="0.9">
    <ellipse cx="550" cy="280" rx="90" ry="55" fill="#ffffff" opacity="0.25"/>
    <ellipse cx="600" cy="270" rx="75" ry="48" fill="#ffffff" opacity="0.25"/>
    <ellipse cx="570" cy="260" rx="65" ry="42" fill="#ffffff" opacity="0.25"/>
  </g>
  
  <!-- Network nodes -->
  <circle cx="300" cy="150" r="8" fill="url(#accentGrad)"/>
  <circle cx="500" cy="200" r="8" fill="url(#accentGrad)"/>
  <circle cx="400" cy="300" r="8" fill="url(#accentGrad)"/>
  <circle cx="350" cy="250" r="6" fill="#ffffff"/>
  <circle cx="450" cy="250" r="6" fill="#ffffff"/>
  
  <!-- Connection lines -->
  <line x1="300" y1="150" x2="500" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="500" y1="200" x2="400" y2="300" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="150" x2="350" y2="250" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="450" y1="250" x2="500" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  
  <!-- Title -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Cloud Computing</text>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.9">Future of Technology</text>
</svg>
