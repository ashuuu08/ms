<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#aiGrad)"/>
  
  <!-- Brain/AI network -->
  <g opacity="0.9">
    <!-- Central node -->
    <circle cx="400" cy="225" r="40" fill="#ffffff" opacity="0.4"/>
    <circle cx="400" cy="225" r="25" fill="#ffffff" opacity="0.6"/>
    
    <!-- Surrounding nodes -->
    <circle cx="300" cy="150" r="20" fill="#ffffff" opacity="0.5"/>
    <circle cx="500" cy="150" r="20" fill="#ffffff" opacity="0.5"/>
    <circle cx="300" cy="300" r="20" fill="#ffffff" opacity="0.5"/>
    <circle cx="500" cy="300" r="20" fill="#ffffff" opacity="0.5"/>
    <circle cx="250" cy="225" r="15" fill="#ffffff" opacity="0.4"/>
    <circle cx="550" cy="225" r="15" fill="#ffffff" opacity="0.4"/>
    
    <!-- Connections -->
    <line x1="400" y1="225" x2="300" y2="150" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="400" y1="225" x2="500" y2="150" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="400" y1="225" x2="300" y2="300" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="400" y1="225" x2="500" y2="300" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="400" y1="225" x2="250" y2="225" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="400" y1="225" x2="550" y2="225" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    
    <!-- Data points -->
    <circle cx="350" cy="180" r="5" fill="#10B981"/>
    <circle cx="450" cy="180" r="5" fill="#F59E0B"/>
    <circle cx="350" cy="270" r="5" fill="#EF4444"/>
    <circle cx="450" cy="270" r="5" fill="#8B5CF6"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="120" r="40" fill="#ffffff" opacity="0.1"/>
  <circle cx="680" cy="330" r="50" fill="#ffffff" opacity="0.1"/>
  
  <!-- Title -->
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">AI & Machine Learning</text>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.9">Practical Applications</text>
</svg>
