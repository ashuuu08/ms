    content="Anuppur,AshbitSoft, software development, IT solutions, custom software, web development, automation, Anuppur, Madhya Pradesh, India, remote work" />

  <!-- Open Graph / Facebook -->

  <!-- Twitter -->

    content="We design bespoke software ecosystems for startups, SMEs, and enterprises. Custom web applications, automation, and digital transformation solutions. Anuppur" />

  <!-- Additional SEO -->
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="revisit-after" content="7 days" />
  <link rel="canonical" href="https://ashbit.in/" />
</head>

<body>
  <div id="root">
    <!-- Static Initial Preloader -->
    <div id="preloader"
      style="position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: sans-serif;">
      <div style="position: relative; width: 96px; height: 96px;">
        <div
          style="width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(52, 158, 201, 0.1); border-top-color: #349ec9; animation: spin 2s linear infinite;">
        </div>
        <div
          style="position: absolute; inset: 8px; border-radius: 50%; border: 2px solid rgba(23, 42, 95, 0.2); border-bottom-color: #172a5f; animation: spin-reverse 1.5s linear infinite;">
        </div>
        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;">
          <img src="/logo.png" alt="AshSoft" style="width: 40px; height: 40px; object-fit: contain; opacity: 0.8;">
        </div>
      </div>
      <div style="margin-top: 32px; display: flex; flex-direction: column; align-items: center;">
        <h2 style="font-size: 24px; font-weight: bold; color: white; letter-spacing: -0.025em; margin: 0;">
          Ashbit<span style="color: #349ec9;">Soft</span>
        </h2>
        <p
          style="font-size: 10px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.42em; margin-top: 8px; margin-left: 4px;">
          IT Solutions
        </p>
      </div>
    </div>
    <style>
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-reverse {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(-360deg);
        }
      }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
